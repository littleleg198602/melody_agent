name: Melody4U Weekly Agent

on:
  workflow_dispatch:
    inputs:
      generate_images:
        description: "Generate paid PNG images"
        required: false
        default: "false"
      max_images:
        description: "Maximum number of images to generate"
        required: false
        default: "1"
      target_slug:
        description: "Optional prompt slug to generate"
        required: false
        default: ""
  schedule:
    - cron: "15 6 * * 0"

permissions:
  contents: write

jobs:
  weekly-agent:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GENERATE_IMAGES: ${{ inputs.generate_images || 'false' }}
      MAX_IMAGES: ${{ inputs.max_images || '1' }}
      TARGET_SLUG: ${{ inputs.target_slug || '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run weekly
      - name: Resolve artifact week
        id: artifact-week
        run: |
          node --input-type=module - <<'NODE' >> "$GITHUB_OUTPUT"
          import { resolveTargetWeek } from './scripts/utils/dates.js';
          console.log(`week=${resolveTargetWeek().week}`);
          NODE
      - name: Upload generated image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: melody4u-images-${{ steps.artifact-week.outputs.week }}
          path: output/**/images/*.png
          retention-days: 7
          if-no-files-found: ignore
      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/weekly/*.json output/** logs/agent.log PROJECT_STRUCTURE.md AGENT_MANIFEST.md agent.manifest.json README.md package.json package-lock.json prompts scripts .env.example .gitignore .github/workflows/weekly-agent.yml
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "chore: update weekly agent outputs"
            git push
          fi
